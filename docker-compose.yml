services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./arbitrations.db:/app/arbitrations.db

  streamlit:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api
    command: >
      streamlit run streamlit_app.py
      --server.address 0.0.0.0
      --server.port 8501
